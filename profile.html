<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль • Free Search</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0f1724, #0a0f14);
            color: #eef2ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .profile-card {
            background: rgba(17, 24, 34, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 2rem;
            max-width: 550px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(110, 255, 170, 0.4);
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #2c3e50;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            color: #6effaa;
            margin-bottom: 1rem;
            border: 2px solid #6effaa;
            overflow: hidden;
            cursor: pointer;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .nickname {
            font-size: 2rem;
            font-weight: bold;
            margin: 0.5rem 0;
            background: linear-gradient(135deg, #fff, #6effaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .nickname span { cursor: pointer; font-size: 1.2rem; }
        .edit-input {
            background: #0f1724;
            border: 1px solid #6effaa;
            border-radius: 30px;
            padding: 0.3rem 1rem;
            color: white;
            font-size: 1rem;
            text-align: center;
        }
        .info { color: #8aa1b9; margin: 0.5rem 0; font-size: 0.8rem; word-break: break-all; }
        .id-box {
            background: #2c1a1a;
            border: 1px solid #ff6b6b;
            border-radius: 24px;
            padding: 0.8rem;
            margin: 1rem 0;
            font-family: monospace;
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: #ffaaaa;
            cursor: pointer;
            transition: 0.2s;
        }
        .id-box:hover { background: #3a2525; border-color: #ff8888; }
        .warning {
            color: #ff8a7a;
            font-size: 0.75rem;
            margin-top: 0.5rem;
            font-weight: bold;
        }
        .btn {
            background: #2c3e50;
            color: #6effaa;
            border: 1px solid rgba(110,255,170,0.3);
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            margin: 0.5rem;
            transition: 0.2s;
        }
        .btn:hover { background: #6effaa; color: #0a0f14; }
        .delete-btn { background: #4a2e2e; color: #ff8a7a; border-color: #ff8a7a; }
        .settings-section { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #334155; text-align: left; }
        .settings-section h4 { color: #6effaa; margin-bottom: 0.5rem; }
        .lang-select { background: #1e2936; color: #6effaa; border: 1px solid #6effaa; padding: 0.4rem 1rem; border-radius: 40px; cursor: pointer; margin-left: 0.5rem; }
        .login-section {
            background: rgba(17,24,34,0.6);
            border-radius: 32px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .login-section input {
            background: #0f1724;
            border: 1px solid #6effaa;
            border-radius: 40px;
            padding: 0.6rem 1rem;
            color: white;
            width: 80%;
            font-family: monospace;
            text-align: center;
        }
        .loading { color: #6effaa; margin: 2rem; }
    </style>
</head>
<body>
<div class="profile-card" id="profileRoot">
    <div id="content" class="loading">⏳ Загрузка...</div>
</div>
<script>
    const STORAGE_KEY = 'freesearch_profile_id';
    let currentProfile = null;
    
    async function loadProfile() {
        const container = document.getElementById('content');
        const savedId = localStorage.getItem(STORAGE_KEY);
        
        if (!savedId) {
            container.innerHTML = `
                <div class="login-section">
                    <h3>🔑 Вход по ID</h3>
                    <input type="text" id="loginIdInput" placeholder="Введите 16-значный ID" maxlength="16">
                    <button id="loginByIdBtn" class="btn">📂 Загрузить профиль</button>
                    <div id="loginMessage" class="warning" style="margin-top:0.5rem;"></div>
                </div>
                <div style="margin: 1rem 0; font-weight:bold; color:#6effaa;">— или —</div>
                <button id="createProfileBtn" class="btn">✨ Создать новый профиль</button>
                <div id="createMessage" class="info" style="margin-top:1rem;"></div>
            `;
            
            document.getElementById('createProfileBtn').addEventListener('click', async () => {
                const msgDiv = document.getElementById('createMessage');
                msgDiv.innerText = 'Генерация...';
                try {
                    const res = await fetch('/api/profile/create', { method: 'POST' });
                    const data = await res.json();
                    if (data.success) {
                        localStorage.setItem(STORAGE_KEY, data.profile.id);
                        loadProfile();
                    } else msgDiv.innerText = 'Ошибка создания профиля';
                } catch(e) { msgDiv.innerText = 'Ошибка сети'; }
            });
            
            document.getElementById('loginByIdBtn').addEventListener('click', async () => {
                const id = document.getElementById('loginIdInput').value.trim();
                const msgDiv = document.getElementById('loginMessage');
                if (!id || id.length !== 16 || !/^\d+$/.test(id)) {
                    msgDiv.innerText = 'ID должен быть 16 цифр';
                    return;
                }
                msgDiv.innerText = 'Загрузка...';
                try {
                    const res = await fetch('/api/profile/get', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id })
                    });
                    const data = await res.json();
                    if (data.success && data.profile) {
                        localStorage.setItem(STORAGE_KEY, id);
                        loadProfile();
                    } else {
                        msgDiv.innerText = 'Профиль не найден';
                    }
                } catch(e) { msgDiv.innerText = 'Ошибка сети'; }
            });
            return;
        }
        
        try {
            const res = await fetch('/api/profile/get', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: savedId })
            });
            const data = await res.json();
            if (!data.success || !data.profile) {
                localStorage.removeItem(STORAGE_KEY);
                loadProfile();
                return;
            }
            currentProfile = data.profile;
            renderProfile(currentProfile);
        } catch(e) {
            container.innerHTML = '<p>❌ Ошибка загрузки профиля</p>';
        }
    }
    
    function renderProfile(profile) {
        const container = document.getElementById('content');
        const avatarHtml = profile.avatar ? `<img src="${profile.avatar}" alt="avatar">` : profile.nickname.charAt(0).toUpperCase();
        container.innerHTML = `
            <div class="avatar" id="avatarUploader">${avatarHtml}</div>
            <div class="nickname"><span id="nicknameDisplay">${escapeHtml(profile.nickname)}</span><span id="editNicknameBtn" style="cursor:pointer;">✏️</span></div>
            <div class="id-box" id="copyIdBtn">🆔 ID: ${profile.id}</div>
            <div class="warning" style="font-size:0.8rem;">⚠️ Скопируйте или сохраните ID — он нужен для входа!</div>
            <div class="info">Создан: ${new Date(profile.created_at).toLocaleDateString()}</div>
            <div class="settings-section"><h4>⚙️ Управление аккаунтом</h4><button id="deleteProfileBtn" class="btn delete-btn">🗑️ Удалить профиль</button></div>
            <div class="settings-section"><h4>🌐 Интерфейс</h4><label>Язык: <select id="langSelect" class="lang-select"><option value="ru" ${profile.settings?.language === 'ru' ? 'selected' : ''}>Русский</option><option value="ky" ${profile.settings?.language === 'ky' ? 'selected' : ''}>Кыргызча</option><option value="en" ${profile.settings?.language === 'en' ? 'selected' : ''}>English</option></select></label></div>
        `;
        
        document.getElementById('avatarUploader').addEventListener('click', () => {
            const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = async (ev) => await updateProfile({ avatar: ev.target.result });
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        });
        
        document.getElementById('editNicknameBtn').addEventListener('click', () => {
            const displaySpan = document.getElementById('nicknameDisplay');
            const input = document.createElement('input'); input.type = 'text'; input.value = currentProfile.nickname; input.className = 'edit-input';
            const save = () => {
                const newNick = input.value.trim();
                if (newNick && newNick !== currentProfile.nickname) updateProfile({ nickname: newNick });
                else renderProfile(currentProfile);
            };
            input.addEventListener('blur', save);
            input.addEventListener('keypress', (e) => { if (e.key === 'Enter') save(); });
            displaySpan.parentNode.replaceChild(input, displaySpan);
            input.focus();
        });
        
        document.getElementById('deleteProfileBtn').addEventListener('click', async () => {
            if (confirm('Удалить профиль навсегда?')) {
                await fetch('/api/profile/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: currentProfile.id })
                });
                localStorage.removeItem(STORAGE_KEY);
                loadProfile();
            }
        });
        
        document.getElementById('langSelect').addEventListener('change', async (e) => {
            const newLang = e.target.value;
            await updateProfile({ settings: { language: newLang } });
            localStorage.setItem('freesearch_lang', newLang);
            window.dispatchEvent(new StorageEvent('storage', { key: 'freesearch_lang', newValue: newLang }));
        });
        
        document.getElementById('copyIdBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(currentProfile.id);
            const originalText = document.getElementById('copyIdBtn').innerText;
            document.getElementById('copyIdBtn').innerText = '✅ ID скопирован!';
            setTimeout(() => {
                document.getElementById('copyIdBtn').innerText = originalText;
            }, 2000);
        });
    }
    
    async function updateProfile(updates) {
        if (!currentProfile) return;
        try {
            const res = await fetch('/api/profile/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: currentProfile.id, updates })
            });
            const data = await res.json();
            if (data.success) {
                currentProfile = data.profile;
                renderProfile(currentProfile);
            } else {
                alert('Ошибка обновления профиля');
            }
        } catch(e) { alert('Ошибка сети'); }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }
    
    loadProfile();
</script>
</body>
</html>
